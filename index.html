<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Huisdierrijk — Afbeelding kiezen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3347;
    --accent:#6c8fff;--accent2:#a78bfa;--green:#34d399;--red:#f87171;
    --text:#e8eaf2;--muted:#6b7280;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding-bottom:3rem;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:.9rem 1.25rem;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;}
  .header-title{font-family:'Instrument Serif',serif;font-size:1.1rem;}
  .header-sub{font-size:.65rem;color:var(--muted);margin-top:2px;}
  .settings-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
  .main{padding:1.25rem;max-width:560px;margin:0 auto;}
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.25rem;display:none;}
  .settings-panel.open{display:block;}
  .settings-title{font-size:.68rem;color:var(--accent);letter-spacing:.12em;margin-bottom:1rem;}
  .field{margin-bottom:.7rem;}
  .field label{display:block;font-size:.7rem;color:var(--muted);margin-bottom:.25rem;}
  .field input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.55rem .7rem;color:var(--text);font-family:inherit;font-size:.82rem;}
  .field input:focus{outline:none;border-color:var(--accent);}
  .save-btn{width:100%;background:var(--accent);color:#000;border:none;border-radius:8px;padding:.65rem;font-family:inherit;font-weight:600;font-size:.85rem;cursor:pointer;margin-top:.25rem;}
  .status-bar{border-radius:8px;padding:.7rem 1rem;font-size:.8rem;margin-bottom:1rem;display:none;line-height:1.4;}
  .status-bar.info{background:#1a2340;border:1px solid #2d4080;color:#93b4ff;display:block;}
  .status-bar.success{background:#0d2e20;border:1px solid #1a5c3a;color:var(--green);display:block;}
  .status-bar.error{background:#2e0d0d;border:1px solid #5c1a1a;color:var(--red);display:block;}
  .diersoort-row{display:flex;gap:.4rem;margin-bottom:1.25rem;flex-wrap:wrap;}
  .diersoort-btn{background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.4rem .85rem;border-radius:20px;cursor:pointer;font-family:inherit;font-size:.78rem;transition:all .15s;}
  .diersoort-btn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent);}
  .load-btn{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.75rem;border-radius:var(--radius);font-family:inherit;font-size:.88rem;font-weight:500;cursor:pointer;margin-bottom:1.25rem;}
  .load-btn:disabled{opacity:.4;cursor:not-allowed;}
  .article-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;margin-bottom:1rem;}
  .article-meta{font-size:.63rem;color:var(--accent2);letter-spacing:.1em;margin-bottom:.35rem;text-transform:uppercase;}
  .article-title{font-family:'Instrument Serif',serif;font-size:1.05rem;line-height:1.4;}
  .fotos-label{font-size:.68rem;color:var(--muted);margin-bottom:.6rem;}
  .foto-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;margin-bottom:1rem;}
  .foto-card{border-radius:9px;overflow:hidden;border:2px solid transparent;cursor:pointer;background:var(--surface2);position:relative;transition:all .15s;}
  .foto-card:active{transform:scale(.97);}
  .foto-card.selected{border-color:var(--accent);}
  .foto-card img{width:100%;aspect-ratio:17/9;object-fit:cover;display:block;}
  .foto-info{padding:.35rem .45rem;font-size:.6rem;color:var(--muted);}
  .foto-check{position:absolute;top:5px;right:5px;width:22px;height:22px;background:var(--accent);border-radius:50%;display:none;align-items:center;justify-content:center;color:#000;font-size:.75rem;font-weight:bold;}
  .foto-card.selected .foto-check{display:flex;}
  .alt-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;}
  .alt-label{font-size:.65rem;color:var(--muted);margin-bottom:.4rem;}
  .alt-tekst{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.6rem .7rem;color:var(--text);font-family:inherit;font-size:.85rem;resize:none;min-height:56px;}
  .alt-tekst:focus{outline:none;border-color:var(--accent);}
  .regen-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:.28rem .6rem;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.68rem;margin-top:.4rem;}
  .confirm-btn{width:100%;background:var(--green);color:#000;border:none;border-radius:var(--radius);padding:.85rem;font-family:inherit;font-weight:600;font-size:.95rem;cursor:pointer;margin-bottom:.5rem;transition:opacity .15s;}
  .confirm-btn:disabled{opacity:.35;cursor:not-allowed;}
  .skip-btn{width:100%;background:none;border:1px solid var(--border);color:var(--muted);border-radius:var(--radius);padding:.65rem;font-family:inherit;font-size:.82rem;cursor:pointer;}
  .done-screen{text-align:center;padding:2.5rem 1rem;display:none;}
  .done-screen.show{display:block;}
  .done-icon{font-size:2.8rem;margin-bottom:.6rem;}
  .done-title{font-family:'Instrument Serif',serif;font-size:1.3rem;margin-bottom:.4rem;}
  .done-sub{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;line-height:1.6;}
  .next-btn{background:var(--accent);color:#000;border:none;border-radius:var(--radius);padding:.75rem 2rem;font-family:inherit;font-weight:600;font-size:.9rem;cursor:pointer;}
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--muted);display:none;}
  .empty-icon{font-size:2.5rem;margin-bottom:.75rem;}
  .empty-text{font-size:.85rem;line-height:1.6;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{display:inline-block;width:13px;height:13px;border:2px solid transparent;border-top-color:currentColor;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px;}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">🐾 Afbeelding kiezen</div>
    <div class="header-sub" id="headerSub">Huisdierrijk</div>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙️</button>
</div>

<div class="main">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title">INSTELLINGEN</div>
    <div class="field"><label>Google Sheets API Key</label><input type="password" id="sheetsKey" placeholder="AIza..."></div>
    <div class="field"><label>Google Sheet ID</label><input type="text" id="sheetId" placeholder="1j-rzIr0Z_..."></div>
    <div class="field"><label>Unsplash Access Key</label><input type="password" id="unsplashKey" placeholder="..."></div>
    <div class="field"><label>Anthropic API Key</label><input type="password" id="anthropicKey" placeholder="sk-ant-..."></div>
    <div class="field"><label>WordPress URL</label><input type="text" id="wpUrl" placeholder="https://www.huisdierrijk.nl"></div>
    <div class="field"><label>WordPress gebruikersnaam</label><input type="text" id="wpUser"></div>
    <div class="field"><label>WordPress App Password</label><input type="password" id="wpPass" placeholder="xxxx xxxx xxxx xxxx xxxx xxxx"></div>
    <button class="save-btn" onclick="slaInstellingenOp()">💾 Opslaan</button>
  </div>

  <div class="status-bar" id="statusBar"></div>

  <div class="diersoort-row">
    <button class="diersoort-btn active" onclick="kiesDiersoort('kippen',this)">🐔 Kippen</button>
    <button class="diersoort-btn" onclick="kiesDiersoort('honden',this)">🐕 Honden</button>
    <button class="diersoort-btn" onclick="kiesDiersoort('katten',this)">🐱 Katten</button>
    <button class="diersoort-btn" onclick="kiesDiersoort('fretten',this)">🐾 Fretten</button>
  </div>

  <button class="load-btn" id="loadBtn" onclick="laadVolgendArtikel()">📋 Laad volgend artikel</button>

  <div id="artikelSection" style="display:none">
    <div class="article-card">
      <div class="article-meta" id="artikelMeta"></div>
      <div class="article-title" id="artikelTitel"></div>
    </div>
    <div class="fotos-label" id="fotosLabel"></div>
    <div class="foto-grid" id="fotoGrid"></div>
    <div class="alt-section" id="altSection" style="display:none">
      <div class="alt-label">ALT-TEKST</div>
      <textarea class="alt-tekst" id="altTekst" rows="2"></textarea>
      <button class="regen-btn" onclick="regenereerAlt()">↻ Opnieuw genereren</button>
    </div>
    <button class="confirm-btn" id="confirmBtn" disabled onclick="bevestig()">✓ Uploaden & opslaan</button>
    <button class="skip-btn" onclick="slaOver()">Overslaan →</button>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="done-icon">✅</div>
    <div class="done-title">Opgeslagen!</div>
    <div class="done-sub" id="doneSub"></div>
    <button class="next-btn" onclick="volgend()">Volgend artikel →</button>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🎉</div>
    <div class="empty-text">Alle artikelen hebben al een afbeelding!</div>
  </div>
</div>

<script>
const SHEET_TAB = "Sheet1";
let cfg={}, huidigArtikel=null, alleArtikelen=[], gekozenFoto=null, diersoort="kippen", huidigZoekterm="";

window.onload = () => {
  const saved = localStorage.getItem("huisdierrijk_cfg");
  if (saved) {
    cfg = JSON.parse(saved);
    document.getElementById("sheetsKey").value    = cfg.sheetsKey    || "";
    document.getElementById("sheetId").value      = cfg.sheetId      || "1j-rzIr0Z_0922x6sBHOhAH9PWK8TWdPOwOUE1_l_42o";
    document.getElementById("unsplashKey").value  = cfg.unsplashKey  || "";
    document.getElementById("anthropicKey").value = cfg.anthropicKey || "";
    document.getElementById("wpUrl").value        = cfg.wpUrl        || "";
    document.getElementById("wpUser").value       = cfg.wpUser       || "";
    document.getElementById("wpPass").value       = cfg.wpPass       || "";
  } else {
    document.getElementById("sheetId").value = "1j-rzIr0Z_0922x6sBHOhAH9PWK8TWdPOwOUE1_l_42o";
  }
};

function slaInstellingenOp() {
  cfg = {
    sheetsKey: document.getElementById("sheetsKey").value.trim(),
    sheetId: document.getElementById("sheetId").value.trim(),
    unsplashKey: document.getElementById("unsplashKey").value.trim(),
    anthropicKey: document.getElementById("anthropicKey").value.trim(),
    wpUrl: document.getElementById("wpUrl").value.trim().replace(/\/$/,""),
    wpUser: document.getElementById("wpUser").value.trim(),
    wpPass: document.getElementById("wpPass").value.trim(),
  };
  localStorage.setItem("huisdierrijk_cfg", JSON.stringify(cfg));
  toonStatus("✅ Opgeslagen!", "success");
  setTimeout(() => document.getElementById("settingsPanel").classList.remove("open"), 1000);
}

function toggleSettings() { document.getElementById("settingsPanel").classList.toggle("open"); }
function kiesDiersoort(soort, btn) {
  diersoort = soort;
  document.querySelectorAll(".diersoort-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("artikelSection").style.display = "none";
  document.getElementById("doneScreen").classList.remove("show");
}

async function leesSheet() {
  if (!cfg.sheetsKey) throw new Error("Google Sheets API key ontbreekt — check instellingen ⚙️");
  const id = cfg.sheetId || "1j-rzIr0Z_0922x6sBHOhAH9PWK8TWdPOwOUE1_l_42o";
  const resp = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${encodeURIComponent(SHEET_TAB)}?key=${cfg.sheetsKey}`);
  if (!resp.ok) { const e = await resp.json(); throw new Error(e.error?.message || "Sheets fout"); }
  const data = await resp.json();
  const rijen = data.values || [];
  if (rijen.length < 2) return [];
  const headers = rijen[0];
  return rijen.slice(1).map(rij => { const o={}; headers.forEach((h,j) => o[h]=rij[j]||""); return o; });
}

async function laadVolgendArtikel() {
  if (!cfg.sheetsKey||!cfg.unsplashKey||!cfg.anthropicKey||!cfg.wpUrl) {
    toonStatus("⚙️ Vul eerst alle API keys in via het instellingen-icoon rechtsboven", "error");
    toggleSettings(); return;
  }
  toonStatus('<span class="spinner"></span> Schema laden...', "info");
  document.getElementById("loadBtn").disabled = true;
  document.getElementById("emptyState").style.display = "none";
  try {
    const rijen = await leesSheet();
    alleArtikelen = rijen.filter(r => r.status?.toLowerCase()==="wacht" && !r.afbeelding_url?.trim());
    if (!alleArtikelen.length) {
      verbergStatus();
      document.getElementById("emptyState").style.display = "block";
      document.getElementById("loadBtn").disabled = false;
      return;
    }
    huidigArtikel = alleArtikelen[0];
    verbergStatus();
    toonArtikel();
  } catch(e) {
    toonStatus("❌ "+e.message, "error");
    document.getElementById("loadBtn").disabled = false;
  }
}

function toonArtikel() {
  document.getElementById("artikelMeta").textContent = `${diersoort.toUpperCase()} · ${huidigArtikel.thema||""} · nog ${alleArtikelen.length} te gaan`;
  document.getElementById("artikelTitel").textContent = huidigArtikel.titel;
  document.getElementById("headerSub").textContent = huidigArtikel.titel.slice(0,35)+"…";
  document.getElementById("artikelSection").style.display = "block";
  document.getElementById("doneScreen").classList.remove("show");
  document.getElementById("altSection").style.display = "none";
  document.getElementById("confirmBtn").disabled = true;
  document.getElementById("fotoGrid").innerHTML = "";
  gekozenFoto = null; huidigZoekterm = "";
  zoekFotos();
}

async function zoekFotos() {
  document.getElementById("fotosLabel").textContent = "🔍 Zoekterm bepalen...";
  try {
    huidigZoekterm = await bepaalZoekterm(huidigArtikel.titel, huidigArtikel.thema||"");
    document.getElementById("fotosLabel").textContent = `🌐 Zoeken: "${huidigZoekterm}"`;
    const fotos = await zoekUnsplash(huidigZoekterm);
    if (!fotos.length) { document.getElementById("fotosLabel").textContent = "⚠️ Geen foto's gevonden"; return; }
    document.getElementById("fotosLabel").textContent = `📸 Kies een foto — ${fotos.length} resultaten`;
    toonFotoGrid(fotos);
  } catch(e) { toonStatus("❌ "+e.message, "error"); document.getElementById("fotosLabel").textContent = ""; }
}

function bepaalZoekterm(titel, thema) {
  // Vertaalwoordenboek NL -> EN voor veelvoorkomende huisdier-termen
  const vertaling = {
    "kippen":"chickens","kip":"chicken","kuikens":"chicks","kuiken":"chick",
    "hanen":"roosters","haan":"rooster","hennen":"hens","hen":"hen",
    "honden":"dogs","hond":"dog","katten":"cats","kat":"cat",
    "fretten":"ferrets","fret":"ferret",
    "gedrag":"behavior","verzorging":"care","voeding":"feeding","food":"food",
    "gezondheid":"health","ziek":"sick","ziekte":"disease",
    "huisvesting":"housing","ren":"coop","kippenren":"chicken coop",
    "eieren":"eggs","ei":"egg","leggen":"laying",
    "rassen":"breeds","ras":"breed",
    "aanschaf":"getting","kopen":"buying",
    "levensfasen":"life stages","jong":"young","oud":"old",
    "grootbrengen":"raising","opfokken":"raising",
    "pikorde":"pecking order","rangorde":"hierarchy",
    "verenpikken":"feather pecking","verenpik":"feather pecking",
    "broeds":"broody","broeden":"brooding",
    "vaccinatie":"vaccination","vaccineren":"vaccinating",
    "wurmen":"worms","vlooien":"fleas","mijten":"mites",
    "activiteiten":"activities","spelen":"playing",
    "winter":"winter","zomer":"summer",
  };

  // Haal woorden uit de titel
  const woorden = titel.toLowerCase()
    .replace(/[^a-z0-9\s]/g, " ")
    .split(/\s+/)
    .filter(w => w.length > 3);

  // Vertaal bekende woorden
  const vertaald = woorden.map(w => vertaling[w] || null).filter(Boolean);

  // Voeg diersoort altijd toe
  const dierEN = vertaling[diersoort] || diersoort;

  // Bouw zoekterm: diersoort + eerste 2 vertaalde woorden
  const uniek = [...new Set([dierEN, ...vertaald])].slice(0, 3);
  return Promise.resolve(uniek.join(" "));
}

async function zoekUnsplash(zoekterm) {
  const resp = await fetch(`https://api.unsplash.com/search/photos?query=${encodeURIComponent(zoekterm)}&per_page=10&orientation=landscape&content_filter=high`,
    {headers:{"Authorization":`Client-ID ${cfg.unsplashKey}`}});
  if (!resp.ok) throw new Error("Unsplash fout: "+resp.status);
  return (await resp.json()).results||[];
}

function toonFotoGrid(fotos) {
  const grid = document.getElementById("fotoGrid");
  grid.innerHTML = "";
  fotos.slice(0,10).forEach(foto => {
    const card = document.createElement("div");
    card.className = "foto-card";
    card.innerHTML = `<img src="${foto.urls.small}" loading="lazy"><div class="foto-check">✓</div><div class="foto-info">${foto.user.name}</div>`;
    card.onclick = () => kiesFoto(foto, card);
    grid.appendChild(card);
  });
}

async function kiesFoto(foto, card) {
  document.querySelectorAll(".foto-card").forEach(c=>c.classList.remove("selected"));
  card.classList.add("selected");
  gekozenFoto = foto;
  document.getElementById("altSection").style.display = "block";
  document.getElementById("altTekst").value = "";
  document.getElementById("altTekst").placeholder = "✍️ Genereren...";
  document.getElementById("confirmBtn").disabled = true;
  try {
    const alt = await genereerAltTekst(huidigArtikel.titel, huidigZoekterm, foto.description||foto.alt_description||"");
    document.getElementById("altTekst").value = alt;
    document.getElementById("altTekst").placeholder = "";
    document.getElementById("confirmBtn").disabled = false;
  } catch(e) {
    document.getElementById("altTekst").placeholder = "Typ hier de alt-tekst...";
    document.getElementById("confirmBtn").disabled = false;
  }
  setTimeout(()=>document.getElementById("confirmBtn").scrollIntoView({behavior:"smooth",block:"nearest"}),400);
}

async function genereerAltTekst(titel, zoekterm, beschr) {
  const bron = beschr || zoekterm || "";
  // Gebruik Netlify function als tussenlaag (geen CORS probleem)
  try {
    const resp = await fetch("/.netlify/functions/claude", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        apiKey: cfg.anthropicKey,
        model: "claude-haiku-4-5-20251001",
        max_tokens: 60,
        system: "Schrijf uitsluitend een Nederlandse alt-tekst (max 12 woorden, beschrijvend, niet beginnen met afbeelding van). Geen aanhalingstekens. Altijd in het Nederlands.",
        messages:[{role:"user", content:"Artikel: " + titel + " | Foto toont: " + bron}]
      })
    });
    const d = await resp.json();
    if (!d.error && d.content && d.content[0] && d.content[0].text) {
      return d.content[0].text.trim().replace(/^["']|["']$/g,"");
    }
  } catch(e) {}
  // Fallback: Nederlandse alt-tekst op basis van artikeltitel
  const titelKort = titel.split(":")[0].split("?")[0].trim();
  const schoon = titelKort.replace(/^(hoe|wat|waarom|wanneer|welke|wie) /i,"").slice(0,50);
  return schoon.charAt(0).toUpperCase() + schoon.slice(1);
}

async function regenereerAlt() {
  if (!gekozenFoto) return;
  document.getElementById("altTekst").value = "";
  document.getElementById("altTekst").placeholder = "✍️ Genereren...";
  document.getElementById("confirmBtn").disabled = true;
  try {
    const alt = await genereerAltTekst(huidigArtikel.titel, huidigZoekterm, gekozenFoto.description||gekozenFoto.alt_description||"");
    document.getElementById("altTekst").value = alt;
    document.getElementById("altTekst").placeholder = "";
    document.getElementById("confirmBtn").disabled = false;
  } catch(e) { document.getElementById("altTekst").placeholder="Typ hier..."; document.getElementById("confirmBtn").disabled=false; }
}

async function bevestig() {
  if (!gekozenFoto) return;
  const altTekst = document.getElementById("altTekst").value.trim();
  if (!altTekst) { toonStatus("❌ Vul een alt-tekst in","error"); return; }
  document.getElementById("confirmBtn").disabled = true;
  document.getElementById("confirmBtn").innerHTML = '<span class="spinner"></span> Uploaden...';
  try {
    toonStatus('<span class="spinner"></span> Afbeelding uploaden naar WordPress...', "info");
    const wpMediaUrl = await uploadNaarWordPress(gekozenFoto, huidigArtikel.titel, altTekst);
    toonStatus('<span class="spinner"></span> Metadata opslaan...', "info");
    await slaOpInSheet(huidigArtikel, wpMediaUrl, altTekst);
    fetch(`https://api.unsplash.com/photos/${gekozenFoto.id}/download`,{headers:{"Authorization":`Client-ID ${cfg.unsplashKey}`}}).catch(()=>{});
    verbergStatus();
    toonSucces(wpMediaUrl, altTekst);
  } catch(e) {
    toonStatus("❌ "+e.message, "error");
    document.getElementById("confirmBtn").disabled = false;
    document.getElementById("confirmBtn").innerHTML = "✓ Uploaden & opslaan";
  }
}

async function uploadNaarWordPress(foto, titel, altTekst) {
  const fotoResp = await fetch(foto.urls.regular);
  if (!fotoResp.ok) throw new Error("Foto downloaden mislukt");
  const blob = await fotoResp.blob();
  const naam = titel.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").replace(/-+/g,"-").slice(0,60);
  const token = btoa(`${cfg.wpUser}:${cfg.wpPass}`);
  const resp = await fetch(`${cfg.wpUrl}/wp-json/wp/v2/media`,{
    method:"POST",
    headers:{"Authorization":`Basic ${token}`,"Content-Disposition":`attachment; filename="${naam}.jpg"`,"Content-Type":blob.type||"image/jpeg"},
    body:blob
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(`Upload fout: ${e.message||resp.status}`); }
  const data = await resp.json();
  await fetch(`${cfg.wpUrl}/wp-json/wp/v2/media/${data.id}`,{
    method:"POST", headers:{"Authorization":`Basic ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify({alt_text:altTekst})
  });
  return data.source_url;
}

async function slaOpAlsWpDraft(artikel, afbeeldingUrl, altTekst) {
  const token = btoa(`${cfg.wpUser}:${cfg.wpPass}`);
  const slug = artikel.onderwerp_slug || artikel.titel.toLowerCase().normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9\s-]/g,"").replace(/\s+/g,"-").slice(0,60);

  // Check bestaande draft
  const check = await fetch(`${cfg.wpUrl}/wp-json/wp/v2/pages?slug=${encodeURIComponent(slug)}&status=draft&per_page=1`,
    {headers:{"Authorization":`Basic ${token}`}});
  const bestaande = await check.json();

  const body = {
    title: artikel.titel, slug, status:"draft",
    meta: { _huisdierrijk_afbeelding_url: afbeeldingUrl, _huisdierrijk_alt_tekst: altTekst }
  };

  const url = bestaande.length > 0
    ? `${cfg.wpUrl}/wp-json/wp/v2/pages/${bestaande[0].id}`
    : `${cfg.wpUrl}/wp-json/wp/v2/pages`;

  const resp = await fetch(url, {
    method:"POST",
    headers:{"Authorization":`Basic ${token}`,"Content-Type":"application/json"},
    body:JSON.stringify(body)
  });
  if (!resp.ok) { const e=await resp.json().catch(()=>({})); throw new Error(`Draft fout: ${e.message||resp.status}`); }
}

function toonSucces(wpUrl, altTekst) {
  document.getElementById("artikelSection").style.display = "none";
  document.getElementById("doneScreen").classList.add("show");
  document.getElementById("doneSub").innerHTML =
    `<strong>${huidigArtikel.titel.slice(0,50)}</strong><br><br>`+
    `✓ Afbeelding geüpload naar WordPress<br>`+
    `✓ Metadata opgeslagen<br><br>`+
    `<span style="color:var(--accent);font-size:.72rem">Draai straks op je laptop: python generator.py --diersoort ${diersoort}</span>`;
}

function volgend() {
  alleArtikelen.shift();
  document.getElementById("doneScreen").classList.remove("show");
  if (!alleArtikelen.length) { document.getElementById("emptyState").style.display="block"; document.getElementById("loadBtn").disabled=false; return; }
  huidigArtikel = alleArtikelen[0];
  toonArtikel();
}

function slaOver() {
  alleArtikelen.shift();
  if (!alleArtikelen.length) { document.getElementById("artikelSection").style.display="none"; document.getElementById("emptyState").style.display="block"; document.getElementById("loadBtn").disabled=false; return; }
  huidigArtikel = alleArtikelen[0];
  toonArtikel();
}

function toonStatus(msg,type){const b=document.getElementById("statusBar");b.innerHTML=msg;b.className="status-bar "+type;}
function verbergStatus(){document.getElementById("statusBar").className="status-bar";}

async function slaOpInSheet(artikel, afbeeldingUrl, altTekst) {
  const resp = await fetch("/.netlify/functions/claude", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      action: "sheets_write",
      artikelId: artikel.id,
      afbeeldingUrl: afbeeldingUrl,
      altTekst: altTekst,
    })
  });
  const data = await resp.json();
  if (!data.success) throw new Error("Sheet schrijven mislukt: " + (data.error || "onbekend"));
}
